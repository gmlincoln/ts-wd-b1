<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <h2>Student Registration Form</h2>
    <form action="">
        <label for="">Full Name:</label>
        <input type="text" placeholder="Full Name">
        <br>
        <br>
        <label for="">Email:</label>
        <input type="email" name="" placeholder="Email" id="">
        <br>
        <br>
        <label for="">Password: </label>
        <input type="password" name="" id="" placeholder="Password">
        <br><br>
        <label for="">Age:</label>
        <input type="number" name="" id="" min="1">
        <br> <br>
        <label for="">Gender: </label>
        <input type="radio" name="gender" > Male
        <input type="radio" name="gender" value=""> Female
        <br> <br>

        <label for="">Skills or Interest: </label>
        <input type="checkbox"> Web Development
        <input type="checkbox"> Graphic Design
        <input type="checkbox"> Digital Marketing

        <br>
        <br>
        <label for="">Date of Birth: </label>
        <input type="date">

        <br>
        <br>
        <label for="">Upload Your Picture</label>
        <input type="file" name="" id="">

        <br> <br>
        <label for="">Course Selection: </label>

        <select name="" id="">
            <option value="">Select Your Course</option>
            <option value="programming">Programming C</option>
            <option value="c++">C++</option>
            <option value="python">Python</option>
        </select>

        <br>
        <br>
        <label for="">Message: </label>
        <textarea name="" id="" rows="10" cols="50"></textarea>

        <br>
        <br>
        <input type="reset" value="Reset">
        <input type="submit" value="Submit">

    </form>

    <h2>Practice Table</h2>
    <table border="1">
        <tr  align="center">
            <td colspan="2">C1</td>
            <td>C2</td>
            <td>C3</td>
        </tr>
        <tr>
            <td rowspan="3">C4</td>
            <td>C5</td>
            <td>C6</td>
            <td>C7</td>
        </tr>
        <tr>
            <td colspan="3">C8</td>
        </tr>
        <tr>
            <td>C9</td>
            <td colspan="2">C10</td>
        </tr>

        <tr>
            <td colspan="4">C11</td>
        </tr>
    </table>


    <table>
        <form action="">
            <tr>
                <td><label for="">Full Name: </label></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td><label for="">Email: </label></td>
                <td><input type="email"></td>
            </tr>
        </form>
    </table>

</body>
</html>
