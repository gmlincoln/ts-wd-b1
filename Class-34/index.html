<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-4">
        <div class="dropdown dropstart text-end">
            <button class="btn btn-success dropdown-toggle" type="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                Dropdown button
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><a class="dropdown-item" href="#">Something else here</a></li>
            </ul>
        </div>

        <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#demo">Collapsible</button>
        <div id="demo" class="collapse">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Sapiente, hic!
        </div>



        <div class="mt-4 mb-4">
            <ul class="nav justify-content-center">
                <li class="nav-item">
                    <a href="" class="nav-link">Item-1</a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">Item-2</a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">Item-3</a>
                </li>
            </ul>
        </div>

        <nav class="navbar navbar-expand-sm bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand text-white" href="#">Navbar</a>
                <ul class="navbar-nav">
                    <li class="nav-item"><a href="" class="nav-link text-white">Home</a></li>
                    <li class="nav-item"><a href="" class="nav-link text-white">About</a></li>
                    <li class="nav-item"><a href="" class="nav-link text-white disabled">Contact</a></li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-light" type="submit">Search</button>
                </form>
            </div>
        </nav>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
